version: '3.9'

services:

  mongodb:
    image: mongo:7
    container_name: blockwarprift_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: blockwarprift_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/blockwarprift
      - JWT_SECRET=supersecret
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: blockwarprift_frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  mongodb_data: